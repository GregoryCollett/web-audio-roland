<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- Step sequencer grid: 4 columns representing steps, some lit -->
  <rect x="4" y="4" width="5" height="5" rx="1" fill="#ff6b35"/>
  <rect x="11.5" y="4" width="5" height="5" rx="1" fill="#2a2a3e"/>
  <rect x="19" y="4" width="5" height="5" rx="1" fill="#ff6b35"/>
  <rect x="26.5" y="4" width="5" height="5" rx="1" fill="#2a2a3e" opacity="0"/>
  <!-- Waveform: sawtooth shape representing synthesis -->
  <path d="M4 20 L10 13 L10 20 L16 13 L16 20 L22 13 L22 20 L28 13 L28 20"
        stroke="#ff6b35" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom bar: playhead indicator -->
  <rect x="4" y="25" width="8" height="3" rx="1.5" fill="#ff6b35" opacity="0.6"/>
  <rect x="14" y="25" width="8" height="3" rx="1.5" fill="#2a2a3e"/>
  <rect x="24" y="25" width="4" height="3" rx="1.5" fill="#2a2a3e"/>
</svg>
